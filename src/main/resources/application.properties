spring.application.name=RealEstate
spring.output.ansi.enabled=ALWAYS

cloudinary.url=${CLOUDINARY_URL}
property.image.folder=${PROPERTY_IMAGE_FOLDER}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=200MB

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

spring.data.web.pageable.serialization-mode=via-dto

jwt.public.key=classpath:app.pub
jwt.private.key=classpath:app.key
security.jwt.refresh-token-duration=${JWT_REFRESH_TOKEN_DURATION:604800}
security.jwt.access-token-duration=${JWT_ACESS_TOKEN_DURATION:8000}
security.authorization-server.url=${AUTHORIZATION_SERVER_URL:http://localhost:8080}



admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}